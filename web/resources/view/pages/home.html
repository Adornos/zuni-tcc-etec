<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZUNI</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100..900&display=swap" rel="stylesheet">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<section class="hero-section">
  <div class="gradient"></div>

  <div class="hero-wrapper">
    <div class="hero-text">
      <h1>
        Onde a Tecnologia Encontra com a Educação
      </h1>

      <p>
        Sistema de gestão escolar que conecta pais e professores
      </p>

      <a href="#">Sobre Nosso Serviço</a>
    </div>

    <div class="hero-image">
      <img src="public/adorable-hispanic-boy-student-wearing-backpack-holding-book-kindergarten-Photoroom 1.svg" alt="">
    </div>
  </div>
</section>

<style>
  html,
  body {
    margin: 0 !important;
    padding: 0 !important;
    width: 100%;
    min-height: 100%;
    overflow-x: hidden;
    background: #F3F8FF;
    font-family: 'Montserrat', sans-serif;
    
  }

  * {
    box-sizing: border-box;
  }

  .hero-section {
    width: 100vw;
    min-height: 100vh;
    margin: 0;
    padding: 0;
    position: relative;
    overflow: hidden;
    background: #F3F8FF;
  }

  .gradient {
    position: absolute;
    width: 1400px;  
    height: 1400px;
    left: -350px;
    top: -320px;
    border-radius: 50%;
    background: linear-gradient(358deg, white 0%, #E7EFFA 100%);
    z-index: 0;
  }

  .hero-wrapper {
    width: 100%;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 3vw 0 2vw;
    position: relative;
    z-index: 2;
  }

  .hero-text {
    max-width: 700px;
  }

  .hero-text h1 {
    font-size: clamp(2.5rem, 6vw, 5.2rem);
    font-weight: 700;
    line-height: 1.1;
    margin-bottom: 24px;

  max-width: 700px;
  transform: translateX(60px);
}
  }

.hero-text p {
  font-size: clamp(1rem, 2vw, 1.7rem);
  margin-bottom: 36px;
  max-width: 580px;
  transform: translateX(40px);
}

  .hero-text a {
    display: inline-block;
    padding: 18px 34px;
    background: #C13936;
    color: white;
    text-decoration: none;
    border-radius: 16px;
    font-size: 1.1rem;
    font-weight: 500;
  }

  .hero-image {
    flex-shrink: 0;
    margin-right: 4vw;
  }

  .hero-image img {
    width: min(42vw, 560px);
    height: auto;
    display: block;
  }

  @media (max-width: 991px) {
    .hero-wrapper {
      flex-direction: column;
      justify-content: center;
      text-align: center;
      padding: 80px 24px 40px;
    }

    .hero-text {
      max-width: 100%;
      margin-bottom: 30px;
    }

    .hero-text p {
      margin-left: auto;
      margin-right: auto;
    }

    .hero-image {
      margin-right: 0;
    }

    .hero-image img {
      width: min(80vw, 380px);
    }
  }
</style>

</body>
</html>
